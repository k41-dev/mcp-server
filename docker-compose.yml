services:
  mcp-server:
    build: .
    container_name: mcp-server
    ports:
      - "8321:8321"
    environment:
      - PORT=8321
      - MCP_API_KEY=${MCP_API_KEY:-}
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./prompts:/app/prompts 
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8321/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      app-net:
        ipv4_address: 172.29.0.7

  agent-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: agent-ui
    ports:
      - "7860:7860"
    env_file:
      - .env                              
    environment:
      - MCP_PUBLIC_URL=http://mcp-server:8321
      - OLLAMA_HOST=http://172.29.0.1:11434 
    depends_on:
      - mcp-server
    restart: unless-stopped
    networks:
      app-net:
        ipv4_address: 172.29.0.9

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    command:
      - http
      - --url=${NGROK_DOMAIN}
      - --log=stdout
      - --log-level=info
      - host.docker.internal:5173
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
      - MCP_PUBLIC_URL=${MCP_PUBLIC_URL}
      - NGROK_DOMAIN=${NGROK_DOMAIN}
    ports:
      - "4042:4040"
    #depends_on:
    #  - mcp-server
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      app-net:
        ipv4_address: 172.29.0.8

networks:
  app-net:
    external: true